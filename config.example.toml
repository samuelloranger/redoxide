[proxy]
bind = "0.0.0.0:25565"
server_address = "forbidden.samlo.cloud"

[target]
host = "minecraft"
port = 25565

[docker]
container_name = "minecraft-minecraft-1"
startup_timeout_secs = 120
idle_shutdown_secs = 600

[status]
# protocol_version and version_name are auto-detected by probing the real server
# and cached in .redoxide-version-cache.json — these values are only used as a
# last resort if the cache is empty (i.e. the server has never been started yet).
protocol_version = 0
max_players = 20
online_motd = "§c🎉 §9§lMy Server§c! 🎉"
version_name = "unknown"
# Optional: read max_players and online_motd directly from server.properties
# server_properties = "/server.properties"
